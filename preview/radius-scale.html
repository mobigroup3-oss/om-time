<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>OM-Time · Radius scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--om-canvas); }
  .row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
  .cell { background: var(--om-canvas-white); border: 1px solid var(--om-hairline); padding: 14px 10px; display: flex; flex-direction: column; align-items: center; gap: 8px; min-height: 130px; justify-content: space-between; border-radius: var(--om-radius-md); }
  .chip { width: 56px; height: 56px; background: var(--om-indigo); }
  .name { font-size: 12px; font-weight: 500; color: var(--om-ink); }
  .px { font-family: var(--om-font-mono); font-size: 10px; color: var(--om-muted); text-align: center; }
</style>
</head>
<body>
<div class="row">
  <div class="cell"><div class="chip" style="border-radius: 4px;"></div><div><div class="name">xs</div><div class="px">4px</div></div></div>
  <div class="cell"><div class="chip" style="border-radius: 8px;"></div><div><div class="name">sm</div><div class="px">8px</div></div></div>
  <div class="cell"><div class="chip" style="border-radius: 12px;"></div><div><div class="name">md</div><div class="px">12px</div></div></div>
  <div class="cell"><div class="chip" style="border-radius: 16px;"></div><div><div class="name">lg</div><div class="px">16px</div></div></div>
  <div class="cell"><div class="chip" style="border-radius: 24px;"></div><div><div class="name">xl</div><div class="px">24px</div></div></div>
  <div class="cell"><div class="chip" style="border-radius: 9999px; width: 80px; height: 32px;"></div><div><div class="name">pill</div><div class="px">9999px</div></div></div>
  <div class="cell"><div class="chip" style="border-radius: 50%;"></div><div><div class="name">full</div><div class="px">50%</div></div></div>
</div>
</body>
</html>
