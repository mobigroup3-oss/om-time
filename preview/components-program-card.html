<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>OM-Time · Program card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@1.17.0/dist/umd/lucide.min.js" integrity="sha384-bdZtphetAEBgkGZvhZXOFDWc55tHGLqaSo1f4qZtgvEiolEBqlJ9u6FTk+CoLfj0" crossorigin="anonymous"></script>
<style>
  body { margin: 0; padding: 24px 28px; background: var(--om-canvas); font-family: var(--om-font-sans); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { background: var(--om-canvas-white); border: 1px solid var(--om-hairline); border-radius: var(--om-radius-lg); padding: 22px; display: flex; flex-direction: column; gap: 14px; box-shadow: var(--om-shadow-card); }
  .tag { display: inline-flex; padding: 5px 11px; background: var(--om-gold-soft); color: var(--om-on-gold); border-radius: var(--om-radius-pill); font-size: 12px; font-weight: 500; align-self: flex-start; }
  .title { font-size: 20px; font-weight: 500; color: var(--om-ink); line-height: 1.3; }
  .meta { display: flex; flex-wrap: wrap; gap: 16px; font-size: 13px; color: var(--om-muted); }
  .meta span { display: inline-flex; align-items: center; gap: 6px; }
  .meta svg { width: 14px; height: 14px; }
  .row-foot { display: flex; align-items: center; justify-content: space-between; }
  .price { font-size: 18px; font-weight: 500; color: var(--om-ink); font-family: var(--om-font-mono); }
  .price-meta { font-size: 12px; color: var(--om-sage-deep); }
  .btn { font-size: 14px; font-weight: 500; padding: 10px 18px; border-radius: var(--om-radius-pill); background: var(--om-ink); color: #fff; border: 0; cursor: pointer; }
  .left-status { font-size: 12px; color: var(--om-warning); display: inline-flex; align-items: center; gap: 5px; }
  .left-status svg { width: 12px; height: 12px; }
</style>
</head>
<body>
<div class="row">
  <div class="card">
    <span class="tag">4-дневный курс</span>
    <div class="title">Вес идеальности с модификацией фигуры</div>
    <div class="meta">
      <span><i data-lucide="calendar-days"></i>4–7 ноября, 17:00</span>
      <span><i data-lucide="user-round"></i>Татьяна Педас</span>
      <span><i data-lucide="map-pin"></i>Офлайн, Алматы</span>
    </div>
    <div class="row-foot">
      <div>
        <div class="price">160 000 ₸</div>
        <div class="price-meta">−15 000 ₸ при предоплате за 3–4 дня</div>
      </div>
      <button class="btn">Записаться</button>
    </div>
    <span class="left-status"><i data-lucide="alert-circle"></i>осталось 3 места</span>
  </div>
  <div class="card">
    <span class="tag" style="background: rgba(184, 191, 168, 0.4); color: var(--om-sage-deep);">Активация программы</span>
    <div class="title">Клубный день — 2 часа</div>
    <div class="meta">
      <span><i data-lucide="calendar-days"></i>10, 18, 21, 24 ноября</span>
      <span><i data-lucide="user-round"></i>Илья Брежнев</span>
      <span><i data-lucide="map-pin"></i>Офлайн</span>
    </div>
    <div class="row-foot">
      <div class="price">12 000 ₸</div>
      <button class="btn">Записаться</button>
    </div>
  </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
