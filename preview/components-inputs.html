<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>OM-Time · Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--om-canvas); font-family: var(--om-font-sans); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 13px; color: var(--om-muted); font-weight: 500; }
  input, select { font-family: inherit; font-size: 15px; padding: 12px 14px; border-radius: var(--om-radius-sm); border: 1px solid var(--om-hairline); background: var(--om-canvas-white); color: var(--om-ink); height: 44px; box-sizing: border-box; outline: none; }
  input::placeholder { color: var(--om-faint); }
  .focused { border-color: var(--om-link); box-shadow: var(--om-shadow-focus); }
  .error { border-color: var(--om-danger); }
  .hint { font-size: 12px; color: var(--om-muted); }
  .hint.err { color: var(--om-danger); }
  .group { display: flex; gap: 10px; flex-wrap: wrap; }
  .chip { padding: 8px 14px; background: var(--om-canvas-white); border: 1px solid var(--om-hairline); border-radius: var(--om-radius-pill); font-size: 13px; color: var(--om-ink); cursor: pointer; }
  .chip.active { background: var(--om-ink); color: #fff; border-color: var(--om-ink); }
</style>
</head>
<body>
<div class="row">
  <div class="field">
    <label>Как к вам обращаться</label>
    <input type="text" placeholder="Имя" value="Алия">
    <span class="hint">Default · 44px, hairline border</span>
  </div>
  <div class="field">
    <label>Телефон</label>
    <input class="focused" type="tel" placeholder="+7 (___) ___-__-__" value="+7 (701) 234-56">
    <span class="hint">Focus · indigo ring</span>
  </div>
  <div class="field">
    <label>Email</label>
    <input class="error" type="email" value="alia@" placeholder="you@example.com">
    <span class="hint err">Проверьте адрес, кажется, окончание потерялось</span>
  </div>
  <div class="field">
    <label>Удобный способ связи</label>
    <div class="group">
      <span class="chip active">WhatsApp</span>
      <span class="chip">Telegram</span>
      <span class="chip">Звонок</span>
    </div>
  </div>
</div>
</body>
</html>
