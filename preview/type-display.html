<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>OM-Time · Type scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--om-canvas); }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .row { display: grid; grid-template-columns: 110px 1fr; align-items: baseline; gap: 24px; padding-bottom: 12px; border-bottom: 1px solid var(--om-hairline-soft); }
  .row:last-child { border-bottom: 0; }
  .meta { font-family: var(--om-font-mono); font-size: 11px; color: var(--om-muted); }
  .specimen { color: var(--om-ink); font-weight: 500; }
</style>
</head>
<body>
<div class="stack">
  <div class="row">
    <span class="meta">56 / 500</span>
    <span class="specimen" style="font-size: 56px; line-height: 1.1; letter-spacing: -0.01em;">Снижение веса</span>
  </div>
  <div class="row">
    <span class="meta">44 / 500</span>
    <span class="specimen" style="font-size: 44px; line-height: 1.15;">Через работу с сознанием</span>
  </div>
  <div class="row">
    <span class="meta">32 / 500</span>
    <span class="specimen" style="font-size: 32px; line-height: 1.2;">Что происходит за 4 дня</span>
  </div>
  <div class="row">
    <span class="meta">24 / 500</span>
    <span class="specimen" style="font-size: 24px; line-height: 1.3;">Кому подходит и кому — нет</span>
  </div>
</div>
</body>
</html>
