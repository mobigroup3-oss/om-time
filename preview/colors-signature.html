<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>OM-Time · Signature surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--om-canvas); }
  .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .card { border-radius: var(--om-radius-lg); padding: 22px; min-height: 200px; display: flex; flex-direction: column; justify-content: space-between; }
  .eyebrow { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; opacity: 0.7; font-weight: 500; }
  .title { font-size: 22px; font-weight: 500; line-height: 1.2; margin-top: 6px; }
  .hex { font-family: var(--om-font-mono); font-size: 11px; opacity: 0.6; }
</style>
</head>
<body>
<div class="row">
  <div class="card" style="background: var(--om-coral); color: var(--om-on-coral);">
    <div>
      <div class="eyebrow">signature</div>
      <div class="title">Стройность без диет, гипноза и срывов</div>
    </div>
    <div class="hex">--om-coral · #C03A3B</div>
  </div>
  <div class="card" style="background: var(--om-indigo); color: var(--om-on-indigo);">
    <div>
      <div class="eyebrow">signature</div>
      <div class="title">4 дня интенсива + 2 месяца сопровождения</div>
    </div>
    <div class="hex">--om-indigo · #2E2470</div>
  </div>
  <div class="card" style="background: var(--om-gold); color: var(--om-on-gold);">
    <div>
      <div class="eyebrow">signature</div>
      <div class="title">93% участников снижают ИМТ</div>
    </div>
    <div class="hex">--om-gold · #F2C12E</div>
  </div>
</div>
</body>
</html>
