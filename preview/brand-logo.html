<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>OM-Time · Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; background: var(--om-canvas); }
  .card { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; padding: 24px 32px; align-items: center; min-height: 220px; }
  .panel { background: var(--om-canvas-white); border: 1px solid var(--om-hairline); border-radius: var(--om-radius-lg); padding: 24px; display: flex; align-items: center; justify-content: center; min-height: 180px; }
  .panel.dark { background: var(--om-indigo-deep); border-color: transparent; }
  .panel img { max-height: 150px; max-width: 100%; height: auto; display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="panel">
    <img src="../assets/om-time-logo.png" alt="OM-Time logo on cream">
  </div>
  <div class="panel dark">
    <img src="../assets/om-time-logo.png" alt="OM-Time logo on indigo">
  </div>
</div>
</body>
</html>
