<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>OM-Time · Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--om-canvas); }
  .stack { display: flex; flex-direction: column; gap: 8px; }
  .row { display: grid; grid-template-columns: 90px 60px 1fr; align-items: center; gap: 14px; padding: 4px 0; border-bottom: 1px solid var(--om-hairline-soft); }
  .row:last-child { border-bottom: 0; }
  .token { font-family: var(--om-font-mono); font-size: 11px; color: var(--om-muted); }
  .px { font-family: var(--om-font-mono); font-size: 13px; color: var(--om-ink); font-weight: 500; }
  .bar { height: 14px; background: var(--om-indigo); border-radius: 2px; }
</style>
</head>
<body>
<div class="stack">
  <div class="row"><span class="token">space-4</span><span class="px">4 px</span><div class="bar" style="width: 4px;"></div></div>
  <div class="row"><span class="token">space-8</span><span class="px">8 px</span><div class="bar" style="width: 8px;"></div></div>
  <div class="row"><span class="token">space-12</span><span class="px">12 px</span><div class="bar" style="width: 12px;"></div></div>
  <div class="row"><span class="token">space-16</span><span class="px">16 px</span><div class="bar" style="width: 16px;"></div></div>
  <div class="row"><span class="token">space-24</span><span class="px">24 px</span><div class="bar" style="width: 24px;"></div></div>
  <div class="row"><span class="token">space-32</span><span class="px">32 px</span><div class="bar" style="width: 32px;"></div></div>
  <div class="row"><span class="token">space-48</span><span class="px">48 px</span><div class="bar" style="width: 48px;"></div></div>
  <div class="row"><span class="token">space-64</span><span class="px">64 px</span><div class="bar" style="width: 64px;"></div></div>
  <div class="row"><span class="token">space-96</span><span class="px">96 px · section</span><div class="bar" style="width: 96px; background: var(--om-coral);"></div></div>
</div>
</body>
</html>
