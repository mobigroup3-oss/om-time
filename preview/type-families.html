<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>OM-Time · Type families</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 28px; background: var(--om-canvas); }
  .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .cell { background: var(--om-canvas-white); border: 1px solid var(--om-hairline); border-radius: var(--om-radius-md); padding: 18px; min-height: 150px; display: flex; flex-direction: column; justify-content: space-between; }
  .glyph { font-size: 64px; line-height: 1; color: var(--om-ink); }
  .lbl { font-family: var(--om-font-mono); font-size: 11px; color: var(--om-muted); }
  .name { font-size: 14px; font-weight: 500; color: var(--om-ink); }
  .role { font-size: 12px; color: var(--om-muted); }
</style>
</head>
<body>
<div class="row">
  <div class="cell">
    <div class="glyph" style="font-family: var(--om-font-sans); font-weight: 500;">Aa Аа</div>
    <div>
      <div class="name">Onest</div>
      <div class="role">Default — display + body</div>
      <div class="lbl">--om-font-sans · 300/400/500/600/700</div>
    </div>
  </div>
  <div class="cell">
    <div class="glyph" style="font-family: var(--om-font-editorial); font-style: italic;">Aa Аа</div>
    <div>
      <div class="name">PT Serif</div>
      <div class="role">Editorial pull-quotes only</div>
      <div class="lbl">--om-font-editorial · 400 italic</div>
    </div>
  </div>
  <div class="cell">
    <div class="glyph" style="font-family: var(--om-font-mono); font-weight: 400; font-size: 56px;">93%</div>
    <div>
      <div class="name">JetBrains Mono</div>
      <div class="role">Numeric tables, prices</div>
      <div class="lbl">--om-font-mono · 400/500</div>
    </div>
  </div>
</div>
</body>
</html>
