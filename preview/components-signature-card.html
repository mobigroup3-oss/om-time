<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>OM-Time · Signature card · coral</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px; background: var(--om-canvas); font-family: var(--om-font-sans); }
  .card { background: var(--om-coral); color: var(--om-on-coral); border-radius: var(--om-radius-lg); padding: 36px 40px; display: grid; grid-template-columns: 1.4fr 1fr; gap: 24px; align-items: center; min-height: 220px; }
  .eyebrow { font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.7; font-weight: 500; }
  h2 { font-size: 30px; font-weight: 500; line-height: 1.15; margin: 10px 0 14px 0; letter-spacing: -0.01em; }
  p { font-size: 15px; line-height: 1.55; opacity: 0.9; max-width: 52ch; margin: 0 0 20px 0; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 22px; background: var(--om-canvas); color: var(--om-ink); border-radius: var(--om-radius-pill); font-weight: 500; font-size: 15px; text-decoration: none; }
  .figure { font-family: var(--om-font-mono); font-size: 100px; font-weight: 400; line-height: 0.9; opacity: 0.95; text-align: right; letter-spacing: -0.04em; }
  .figure small { display: block; font-family: var(--om-font-sans); font-size: 14px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 8px; font-weight: 500; }
</style>
</head>
<body>
<div class="card">
  <div>
    <span class="eyebrow">флагманская методика</span>
    <h2>Стройность без диет, гипноза и срывов</h2>
    <p>Четырёхдневный интенсив на основе психосоматики, медитации и нейропластики. Лицензирована как медицинская методика.</p>
    <a class="btn" href="#">Записаться на программу →</a>
  </div>
  <div class="figure">4
    <small>дня интенсива</small>
  </div>
</div>
</body>
</html>
