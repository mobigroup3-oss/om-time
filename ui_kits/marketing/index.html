<body>
  <div class="om-splash" id="om-splash" aria-hidden="true">
    <div class="om-splash-mark">
      <img src="../../assets/om-time-mark.png" alt="">
    </div>
    <div class="om-splash-line"><span></span></div>
    <div class="om-splash-meta">центр современных психотехнологий</div>
  </div>

  <div class="om-grain" aria-hidden="true"></div>

  <div class="om-progress" aria-hidden="true"><span id="om-progress-bar"></span></div>

  <div id="root"></div>

  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="TrustNumbers.jsx"></script>
  <script type="text/babel" src="PainCards.jsx"></script>
  <script type="text/babel" src="MethodologyLevels.jsx"></script>
  <script type="text/babel" src="IntensiveDays.jsx"></script>
  <script type="text/babel" src="ComparisonTable.jsx"></script>

  <script type="text/babel" src="Suitability.jsx"></script>
  <script type="text/babel" src="Testimonials.jsx"></script>
  <script type="text/babel" src="FAQ.jsx"></script>
  <script type="text/babel" src="CtaBand.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>

  <script type="text/babel">
    function App() {
      const [active, setActive] = React.useState('home');

      React.useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      });

      return (
        <div className="om-page" id="top">
          <Header active={active} onNav={setActive} />
          <main>
            <Hero />
            <TrustNumbers />
            <PainCards />
            <MethodologyLevels />
            <IntensiveDays />
            <ComparisonTable />
            <Schedule />
            <Suitability />
            <Testimonials />
            <FAQ />
            <CtaBand />
          </main>
          <Footer />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script src="animations.js"></script>
