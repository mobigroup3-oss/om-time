<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <base href="/ui_kits/marketing/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отзывы — OM Time</title>
  <meta name="description" content="Реальные отзывы клиентов OM Time о методике «Вес идеальности» — похудение через работу с сознанием. Алматы и онлайн.">
  <link rel="icon" type="image/png" href="../../assets/om-time-favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,0..100;1,9..144,300..700,0..100&display=swap">

  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="stylesheet" href="page.css">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="https://unpkg.com/lucide@1.17.0/dist/umd/lucide.min.js" integrity="sha384-bdZtphetAEBgkGZvhZXOFDWc55tHGLqaSo1f4qZtgvEiolEBqlJ9u6FTk+CoLfj0" crossorigin="anonymous"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="om-splash" id="om-splash" aria-hidden="true">
    <div class="om-splash-mark">
      <img src="../../assets/om-time-mark.png" alt="">
    </div>
    <div class="om-splash-line"><span></span></div>
    <div class="om-splash-meta">центр современных психотехнологий</div>
  </div>

  <div class="om-grain" aria-hidden="true"></div>

  <div class="om-progress" aria-hidden="true"><span id="om-progress-bar"></span></div>

  <div id="root"></div>

  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel" src="ReviewsPage.jsx"></script>

  <script type="text/babel">
    function App() {
      React.useEffect(function() {
        if (window.lucide) window.lucide.createIcons();
      });

      return (
        <div className="om-page" id="top">
          <Header active="reviews" onNav={function(){}} />
          <main>
            <ReviewsPage />
          </main>
          <Footer />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script>
    (function () {
      var splash = document.getElementById('om-splash');
      function dismiss() {
        if (splash) { splash.classList.add('om-splash-out'); }
      }
      document.addEventListener('DOMContentLoaded', function () {
        var root = document.getElementById('root');
        var attempts = 0;
        var check = setInterval(function () {
          if ((root && root.children.length > 0) || attempts > 40) {
            clearInterval(check);
            setTimeout(dismiss, 200);
          }
          attempts++;
        }, 100);
      });

      window.addEventListener('scroll', function () {
        var bar = document.getElementById('om-progress-bar');
        if (!bar) return;
        var pct = (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100;
        bar.style.width = Math.min(pct, 100) + '%';
      }, { passive: true });
    })();
  </script>

  <script>
    (function () {
      var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      function waitForReact(cb, attempts) {
        attempts = attempts || 0;
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          cb();
        } else if (attempts < 60) {
          setTimeout(function () { waitForReact(cb, attempts + 1); }, 100);
        }
      }

      waitForReact(function () {
        if (typeof gsap === 'undefined') return;
        gsap.registerPlugin(ScrollTrigger);

        /* Header glass on scroll */
        var header = document.querySelector('[data-animate="header"]');
        if (header) {
          ScrollTrigger.create({
            start: 'top -60',
            onUpdate: function (self) {
              var p = Math.min(self.progress * 10, 1);
              gsap.set(header, {
                backdropFilter: 'blur(' + (p * 16) + 'px)',
                boxShadow: '0 1px 0 rgba(27,24,64,' + (p * 0.08) + ')',
                background: 'rgba(251,248,242,' + (0.72 + p * 0.23) + ')',
              });
            }
          });
        }

        if (prefersReduced) {
          gsap.utils.toArray('[data-animate]').forEach(function (el) {
            gsap.fromTo(el, { opacity: 0 }, {
              opacity: 1, duration: 0.4,
              scrollTrigger: { trigger: el, start: 'top 90%' }
            });
          });
          return;
        }

        /* Hero entrance */
        var heroContent = document.querySelector('[data-animate="reviews-hero-content"]');
        if (heroContent) {
          var tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
          tl.from(heroContent.children[0], { y: 10, opacity: 0, duration: 0.4 })
            .from(heroContent.children[1], { y: 36, opacity: 0, duration: 0.65 }, '-=0.2')
            .from(heroContent.children[2], { y: 20, opacity: 0, duration: 0.5 }, '-=0.3');
        }

        /* Hero stat chips */
        gsap.from('[data-animate="reviews-hero-chips"] > *', {
          x: 30, opacity: 0, duration: 0.55, stagger: 0.1, ease: 'power2.out',
          delay: 0.3,
        });

        /* Filter chips */
        gsap.from('[data-animate="reviews-filter"] > *', {
          y: -14, opacity: 0, scale: 0.92, duration: 0.4, stagger: 0.07, ease: 'back.out(1.5)',
          scrollTrigger: { trigger: '[data-animate="reviews-filter"]', start: 'top 84%' }
        });

        /* Featured quote */
        var featured = document.querySelector('[data-animate="reviews-featured"]');
        if (featured) {
          gsap.from(featured, {
            y: 32, opacity: 0, duration: 0.65, ease: 'power2.out',
            scrollTrigger: { trigger: featured, start: 'top 82%' }
          });
        }

        /* Form head */
        var formHead = document.querySelector('[data-animate="reviews-form-head"]');
        if (formHead) {
          gsap.from(formHead, {
            x: -32, opacity: 0, duration: 0.6, ease: 'power2.out',
            scrollTrigger: { trigger: formHead, start: 'top 82%' }
          });
        }

        /* Form card */
        var formCard = document.querySelector('[data-animate="reviews-form-card"]');
        if (formCard) {
          gsap.from(formCard, {
            y: 40, opacity: 0, duration: 0.65, ease: 'power2.out',
            scrollTrigger: { trigger: formCard, start: 'top 84%' }
          });
        }

        /* CTA */
        var cta = document.querySelector('[data-animate="reviews-cta"]');
        if (cta) {
          gsap.from(cta.querySelector('.om-cta-card') || cta, {
            y: 24, opacity: 0, scale: 0.98, duration: 0.6, ease: 'power2.out',
            scrollTrigger: { trigger: cta, start: 'top 80%' }
          });
        }

        ScrollTrigger.refresh();
      });
    })();
  </script>
</body>
</html>
